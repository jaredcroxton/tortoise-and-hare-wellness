<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#FFF8F1"/>
  <ellipse cx="600" cy="280" rx="500" ry="400" fill="url(#bg1)"/>

  <!-- Brand centered -->
  <g transform="translate(600, 70)" text-anchor="middle">
    <!-- Tortoise silhouette -->
    <g fill="#11122D" transform="translate(-60, 0) scale(0.7)">
      <ellipse cx="38" cy="42" rx="26" ry="15"/>
      <ellipse cx="60" cy="37" rx="7" ry="5"/>
      <ellipse cx="22" cy="54" rx="4" ry="3.5"/>
      <ellipse cx="48" cy="54" rx="4" ry="3.5"/>
    </g>
    <!-- Hare silhouette -->
    <g fill="#11122D" transform="translate(10, 0) scale(0.7)">
      <ellipse cx="30" cy="44" rx="15" ry="11"/>
      <ellipse cx="18" cy="30" rx="8" ry="9"/>
      <ellipse cx="14" cy="12" rx="3.5" ry="13" transform="rotate(-10 14 12)"/>
      <ellipse cx="22" cy="12" rx="3.5" ry="13" transform="rotate(5 22 12)"/>
      <ellipse cx="36" cy="52" rx="8" ry="5"/>
    </g>
    <text x="0" y="90"
          font-family="'Libre Baskerville', Georgia, serif"
          font-weight="700" font-size="24"
          fill="#11122D"
          text-anchor="middle">Tortoise &amp; Hare Wellness</text>
  </g>

  <!-- Headline centered -->
  <text x="600" y="270"
        font-family="'Libre Baskerville', Georgia, serif"
        font-weight="700" font-size="72"
        fill="#11122D" text-anchor="middle"
        letter-spacing="-2">The signals a team</text>
  <text x="600" y="360"
        font-family="'Libre Baskerville', Georgia, serif"
        font-style="italic" font-weight="400" font-size="82"
        fill="#10B981" text-anchor="middle"
        letter-spacing="-2">never says</text>
  <text x="600" y="450"
        font-family="'Libre Baskerville', Georgia, serif"
        font-weight="700" font-size="72"
        fill="#11122D" text-anchor="middle"
        letter-spacing="-2">out loud.</text>

  <!-- Pulse line -->
  <g transform="translate(0, 510)" opacity="0.7">
    <line x1="0" y1="15" x2="1200" y2="15" stroke="#11122D" stroke-opacity="0.08" stroke-width="1"/>
    <path d="M200 15 L500 15 L520 5 L540 25 L560 -10 L580 40 L600 15 L700 15 L720 5 L740 25 L760 -10 L780 40 L800 15 L1000 15"
          fill="none" stroke="#10B981" stroke-width="2.5"/>
  </g>

  <text x="600" y="590"
        font-family="'JetBrains Mono', monospace"
        font-size="15" font-weight="500"
        fill="#6B7280" text-anchor="middle"
        letter-spacing="4">PSYCHOLOGICAL SAFETY, LISTENED TO</text>
</svg>
